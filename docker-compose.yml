version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: lifelink-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:?Set MONGO_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifelink-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/lifelink?authSource=admin
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./lifelink-frontend
      dockerfile: Dockerfile
    container_name: lifelink-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./lifelink-frontend/.env
    environment:
      - NODE_ENV=development
      - VITE_API_TARGET=http://backend:5000
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./lifelink-frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongodb_data:
